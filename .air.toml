root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/server ./cmd/server"
bin = "./tmp/server"
full_bin = "./tmp/server"
include_ext = ["go"]
exclude_dir = ["tmp", "frontend", "stubs", "deployments", "helm", "docs", "scripts", ".git"]
exclude_regex = ["_test\\.go"]
delay = 1000
stop_on_error = true

[log]
time = true

[color]
main    = "magenta"
watcher = "cyan"
build   = "yellow"
runner  = "green"

[misc]
clean_on_exit = true
