{{/* ConfigMap */}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rayyan-asm.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rayyan-asm.labels" . | nindent 4 }}
data:
  RAYYAN_APP_ENVIRONMENT: "production"
  RAYYAN_SERVER_HOST: "0.0.0.0"
  RAYYAN_SERVER_PORT: "8080"
  RAYYAN_DATABASE_DRIVER: "postgres"
  RAYYAN_DATABASE_HOST: {{ printf "%s-postgresql" .Release.Name | quote }}
  RAYYAN_DATABASE_PORT: "5432"
  RAYYAN_DATABASE_NAME: {{ .Values.postgresql.auth.database | quote }}
  RAYYAN_DATABASE_USER: {{ .Values.postgresql.auth.username | quote }}
  RAYYAN_DATABASE_SSLMODE: "disable"
  RAYYAN_REDIS_ENABLED: "true"
  RAYYAN_REDIS_HOST: {{ printf "%s-redis-master" .Release.Name | quote }}
  RAYYAN_REDIS_PORT: "6379"
  RAYYAN_QUEUE_WORKERS: "20"
  RAYYAN_LOG_LEVEL: "info"
  RAYYAN_LOG_FORMAT: "json"
  RAYYAN_SERVER_ALLOWEDORIGINS: {{ index .Values.ingress.hosts 0 "host" | printf "https://%s" | quote }}

---
{{/* Secret */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rayyan-asm.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rayyan-asm.labels" . | nindent 4 }}
type: Opaque
stringData:
  RAYYAN_DATABASE_PASSWORD: {{ .Values.env.postgresPassword | required "env.postgresPassword is required" | quote }}
  RAYYAN_REDIS_PASSWORD: {{ .Values.env.redisPassword | required "env.redisPassword is required" | quote }}
  RAYYAN_AUTH_JWTSECRET: {{ .Values.env.jwtSecret | required "env.jwtSecret is required" | quote }}
  RAYYAN_EXTERNAL_SHODANAPIKEY: {{ .Values.env.shodanApiKey | default "" | quote }}
  RAYYAN_EXTERNAL_CENSYSAPIID: {{ .Values.env.censysApiId | default "" | quote }}
  RAYYAN_EXTERNAL_CENSYSAPISECRET: {{ .Values.env.censysApiSecret | default "" | quote }}
  RAYYAN_EXTERNAL_SECURITYTRAILSKEY: {{ .Values.env.securitytrailsKey | default "" | quote }}
  RAYYAN_EXTERNAL_VIRUSTOTALKEY: {{ .Values.env.virustotalKey | default "" | quote }}

---
{{/* Ingress */}}
{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "rayyan-asm.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rayyan-asm.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "rayyan-asm.fullname" $ }}-backend
                port:
                  number: {{ $.Values.service.backend.port }}
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ include "rayyan-asm.fullname" $ }}-backend
                port:
                  number: {{ $.Values.service.backend.port }}
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: {{ include "rayyan-asm.fullname" $ }}-backend
                port:
                  number: {{ $.Values.service.backend.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "rayyan-asm.fullname" $ }}-frontend
                port:
                  number: {{ $.Values.service.frontend.port }}
    {{- end }}
{{- end }}

---
{{/* HorizontalPodAutoscaler */}}
{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "rayyan-asm.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rayyan-asm.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "rayyan-asm.fullname" . }}-backend
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}

---
{{/* PodDisruptionBudget — ensures at least 1 backend replica is always available */}}
{{- if gt (int .Values.replicaCount) 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "rayyan-asm.fullname" . }}-backend-pdb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rayyan-asm.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: rayyan-backend
{{- end }}

---
{{/* ServiceAccount */}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "rayyan-asm.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rayyan-asm.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

---
{{/* PersistentVolumeClaim for reports */}}
{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "rayyan-asm.fullname" . }}-reports
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rayyan-asm.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteMany
  {{- if .Values.persistence.reports.storageClass }}
  storageClassName: {{ .Values.persistence.reports.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.reports.size }}
{{- end }}
